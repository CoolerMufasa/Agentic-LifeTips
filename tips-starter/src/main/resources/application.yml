server:
  port: 8080

spring:
  application:
    name: agentic-life-tips

  # DeepSeek 双模型配置（通过 OpenAI 兼容接口）
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:xxxx}
      base-url: https://api.deepseek.com
      planner:
        model: ${PLANNER_MODEL:deepseek-v4-pro}
      worker:
        model: ${WORKER_MODEL:deepseek-v4-flash}

    # 百炼云 DashScope 知识库
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:xxxx}

# Tavily 搜索 API Key
tavily:
  api-key: ${TAVILY_API_KEY:xxxx}

# 百炼云知识库
dashscope:
  knowledge-base:
    index-name: ${DASHSCOPE_KB_INDEX:life-tips-knowledge}

logging:
  level:
    com.lifetips: DEBUG
