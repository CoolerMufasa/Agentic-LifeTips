<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>生活小百科 Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            width: 100%;
            max-width: 700px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }
        .header {
            padding: 20px 24px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }
        .header h1 { font-size: 1.4em; color: #2c3e50; }
        .header p { font-size: 0.85em; color: #999; margin-top: 4px; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 10px;
            line-height: 1.6;
            font-size: 0.95em;
            word-break: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #e3f2fd;
            border-bottom-right-radius: 4px;
        }
        .message.agent {
            align-self: flex-start;
            background: #f8f9fa;
            border-bottom-left-radius: 4px;
            white-space: pre-wrap;
        }
        .message.agent.thinking { color: #999; font-style: italic; }
        /* V1 类型化消息样式 */
        .msg-reasoning { color: #5b7a9e; font-style: italic; padding: 4px 0; }
        .msg-hypotheses { background: #f0f4ff; border-radius: 8px; padding: 8px 12px; margin: 4px 0; }
        .msg-hypotheses ul { margin: 4px 0 0 16px; padding: 0; }
        .msg-hypotheses li { margin: 2px 0; font-size: 0.9em; }
        .msg-verifying { color: #e67e22; padding: 2px 0; }
        .msg-confirmed { color: #27ae60; padding: 2px 0; }
        .msg-ruled-out { color: #95a5a6; text-decoration: line-through; padding: 2px 0; }
        .msg-conclusion { background: #e8f5e9; border-left: 3px solid #4caf50; border-radius: 4px; padding: 8px 12px; margin: 8px 0; font-weight: 500; }
        .msg-disclaimer { color: #999; font-size: 0.8em; padding: 4px 0; margin-top: 8px; }
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 0.95em;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area input:focus { border-color: #2196f3; }
        .input-area button {
            padding: 12px 24px;
            background: #2196f3;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 0.95em;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-area button:hover { background: #1976d2; }
        .input-area button:disabled { background: #ccc; cursor: not-allowed; }
        .quick-tips {
            padding: 0 24px 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .quick-tip {
            padding: 6px 14px;
            background: #f0f4ff;
            border: 1px solid #dbe4ff;
            border-radius: 16px;
            font-size: 0.8em;
            color: #495057;
            cursor: pointer;
            transition: background 0.2s;
        }
        .quick-tip:hover { background: #dbe4ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 生活小百科</h1>
            <p>家居清洁 · 衣物护理 · 烹饪技巧 · 收纳妙招</p>
        </div>

        <div class="messages" id="messages">
            <div class="message agent">
                你好呀！我是你的生活小百科助手～<br>
                可以问我这些问题：<br>
                · 白衬衫上的红酒渍怎么洗<br>
                · 冰箱有异味怎么除掉<br>
                · 鸡蛋放多久就不能吃了
            </div>
        </div>

        <div class="quick-tips" id="quickTips">
            <span class="quick-tip" onclick="ask('白衬衫上的红酒渍怎么洗')">🍷 红酒渍清洗</span>
            <span class="quick-tip" onclick="ask('冰箱有异味怎么除掉')">🧊 冰箱除异味</span>
            <span class="quick-tip" onclick="ask('怎么判断鸡蛋新不新鲜')">🥚 判断鸡蛋新鲜</span>
        </div>

        <div class="input-area">
            <input id="userInput" onkeydown="if(event.key==='Enter') send()"
                   placeholder="输入你的生活问题..."
                   type="text">
            <button id="sendBtn" onclick="send()">发送</button>
        </div>
    </div>

    <script>
        let chatId = '';

        function ask(question) {
            document.getElementById('userInput').value = question;
            send();
        }

        function enableInput() {
            document.getElementById('userInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('userInput').focus();
        }

        async function send() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const message = input.value.trim();
            if (!message) return;

            input.disabled = true;
            btn.disabled = true;
            input.value = '';

            addMessage('user', message);

            // 状态栏——显示步骤进度，最终答案会替换掉它
            const statusDiv = addMessage('agent', '🤔 思考中...');
            statusDiv.classList.add('thinking');

            let agentMsg = null;   // 最终答案气泡
            let typedMode = false; // V1 类型化消息模式

            try {
                const url = `/api/chat?message=${encodeURIComponent(message)}&chatId=${chatId}`;
                const eventSource = new EventSource(url);

                eventSource.onmessage = (event) => {
                    const data = event.data;

                    // 流结束标记 → 恢复输入
                    if (data === '[DONE]') {
                        eventSource.close();
                        enableInput();
                        if (!chatId) chatId = 'chat-' + Date.now();
                        if (typedMode) {
                            typedMode = false;
                        }
                        return;
                    }

                    // V1 类型化 JSON 消息
                    if (data.startsWith('{') && data.includes('"type"')) {
                        try {
                            const msg = JSON.parse(data);
                            if (msg.type) {
                                if (!typedMode) {
                                    typedMode = true;
                                    if (statusDiv) statusDiv.remove();
                                }
                                renderTypedMessage(msg);
                                return;
                            }
                        } catch(e) { /* 不是有效 JSON，走纯文本逻辑 */ }
                    }

                    // V0 纯文本消息（兼容）
                    // 步骤/思考过程 → 更新状态栏
                    if (data.startsWith('[') || data.startsWith('💭') ||
                        data.startsWith('🔍') || data.startsWith('📋')) {
                        statusDiv.textContent = data;
                        statusDiv.classList.remove('thinking');
                        return;
                    }

                    // 最终答案 → 新气泡
                    if (!agentMsg) {
                        agentMsg = addMessage('agent', '');
                        statusDiv.remove();
                    }
                    agentMsg.textContent += data + '\n';
                    document.getElementById('messages').scrollTop =
                        document.getElementById('messages').scrollHeight;
                };

                eventSource.onerror = () => {
                    eventSource.close();
                    enableInput();
                    if (!chatId) chatId = 'chat-' + Date.now();
                };
            } catch (err) {
                statusDiv.textContent = '请求失败: ' + err.message;
                statusDiv.classList.remove('thinking');
                enableInput();
            }
        }

        function renderTypedMessage(msg) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message agent';

            switch(msg.type) {
                case 'REASONING':
                    div.innerHTML = '<div class="msg-reasoning">🤔 ' + escapeHtml(msg.content) + '</div>';
                    break;
                case 'HYPOTHESIS_LIST':
                    // content 格式："整理了 N 种可能：[{...}, {...}]"
                    const match = msg.content.match(/^整理了 (\d+) 种可能：(.+)$/);
                    let html = '<div class="msg-hypotheses">📋 ' + msg.content.split('：[')[0];
                    if (match) {
                        try {
                            const hyps = JSON.parse(match[2]);
                            html += '：<ul>';
                            hyps.forEach(h => {
                                html += '<li>' + escapeHtml(h.description)
                                    + ' <span style="color:#999;font-size:0.85em">(置信度: '
                                    + Math.round(h.confidence * 100) + '%)</span></li>';
                            });
                            html += '</ul>';
                        } catch(e) {
                            html += '</div>';
                        }
                    }
                    html += '</div>';
                    div.innerHTML = html;
                    break;
                case 'VERIFYING':
                    div.innerHTML = '<div class="msg-verifying">🔍 ' + escapeHtml(msg.content) + '</div>';
                    break;
                case 'CONFIRMED':
                    div.innerHTML = '<div class="msg-confirmed">✅ ' + escapeHtml(msg.content) + '</div>';
                    break;
                case 'RULED_OUT':
                    div.innerHTML = '<div class="msg-ruled-out">❌ ' + escapeHtml(msg.content) + '</div>';
                    break;
                case 'CONCLUSION':
                    div.innerHTML = '<div class="msg-conclusion">📝 ' + escapeHtml(msg.content).replace(/\n/g, '<br>') + '</div>';
                    break;
                case 'DISCLAIMER':
                    div.innerHTML = '<div class="msg-disclaimer">⚠️ ' + escapeHtml(msg.content) + '</div>';
                    break;
                default:
                    div.textContent = msg.content;
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.textContent = text;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop =
                document.getElementById('messages').scrollHeight;
            return div;
        }
    </script>
</body>
</html>
